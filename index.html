    <style>
        body{font-family:'Inter',sans-serif;}
        h1,h2,h3,.font-display{font-family:'Outfit',sans-serif;}
        .grid-bg{background-image:linear-gradient(rgba(0,0,0,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.05) 1px,transparent 1px);background-size:40px 40px;}
        .dark .grid-bg{background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);}
        /* Sidebar scrollbar matches theme */
        #ds-sidebar{scrollbar-width:thin;scrollbar-color:#cbd5e1 transparent;}
        #ds-sidebar::-webkit-scrollbar{width:4px;}
        #ds-sidebar::-webkit-scrollbar-track{background:transparent;}
        #ds-sidebar::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px;}
        .dark #ds-sidebar::-webkit-scrollbar-thumb{background:#334155;}
        /* Scroll-to-top btn */
        #scroll-top{opacity:0;pointer-events:none;transition:opacity .25s;}
        #scroll-top.visible{opacity:1;pointer-events:auto;}
        /* card hover */
        .topic-card{transition:all 0.25s cubic-bezier(.4,0,.2,1);}
        .topic-card:hover{transform:translateY(-4px);}
        .dark .topic-card:hover{box-shadow:0 20px 40px rgba(0,0,0,.5),0 0 20px rgba(59,130,246,.12);border-color:rgba(96,165,250,.3);}
        .topic-card:hover{box-shadow:0 20px 40px rgba(0,0,0,.08);border-color:rgba(96,165,250,.3);}
        


        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }
    </style>

    <div class="absolute w-[30rem] h-[30rem] bg-emerald-400/30 dark:bg-emerald-600/30 rounded-full mix-blend-multiply dark:mix-blend-overlay filter blur-[100px] animate-blob animation-delay-4000 bottom-[-10%]"></div>

<!-- MAIN -->

    <div id="ds-main-content" class="transition-all duration-300"><main data-sb-padded="1" class="relative z-10 flex-1 flex items-center justify-center min-h-[70vh] px-6 max-w-7xl mx-auto w-full">
        <div class="text-center max-w-4xl flex flex-col items-center">
            

            
            <div class="relative z-10 pt-4">
                <style>
                    .gradient-text {
                        background: linear-gradient(to right, #2563eb, #7c3aed, #db2777, #7c3aed, #2563eb);
                        background-size: 200% auto;
                        -webkit-background-clip: text;
                        background-clip: text;
                        color: transparent;
                        animation: gradient-move 4s linear infinite;
                        display: inline-block;
                    }
                    
                    @keyframes gradient-move {
                        0% { background-position: 0% 50%; }
                        100% { background-position: 200% 50%; }
                    }

                    #word-rotator-container {
                        vertical-align: baseline; 
                        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
                        min-width: 0.5em;
                        display: inline-flex;
                        position: relative;
                    }
                </style>
                <h1 class="font-display font-black text-6xl md:text-8xl tracking-tighter mb-8 leading-[1.05] text-slate-900 dark:text-white pb-4">
                    Master <span id="word-rotator-container"><span id="word-rotator" class="gradient-text transform transition-all duration-300">AI</span></span>
                    <br /> Architectures
                </h1>

                <script>
                    (function() {
                        const words = ["AI", "Data", "DE", "ML", "Python", "SQL", "Spark", "Cloud"];
                        let index = 0;
                        const el = document.getElementById('word-rotator');
                        const container = document.getElementById('word-rotator-container');
                        
                        function updateWidth() {
                            if (el && container) {
                                container.style.width = el.offsetWidth + 'px';
                            }
                        }
                        
                        // Initial setup
                        setTimeout(updateWidth, 100);
                        window.addEventListener('resize', updateWidth);
                        
                        setInterval(() => {
                            el.style.opacity = '0';
                            el.style.transform = 'translateY(15px)';
                            
                            setTimeout(() => {
                                index = (index + 1) % words.length;
                                el.textContent = words[index];
                                updateWidth();
                                
                                el.style.transform = 'translateY(-15px)';
                                setTimeout(() => {
                                    el.style.opacity = '1';
                                    el.style.transform = 'translateY(0)';
                                }, 50);
                            }, 300);
                        }, 3000);
                    })();
                </script>
                
                <p class="text-slate-600 dark:text-slate-400 text-xl md:text-2xl max-w-3xl mx-auto leading-relaxed transition-colors duration-300 font-medium">
                    Curated guides, modern architectural patterns, and practical cheat sheets covering everything from Python and SQL to advanced Cloud, Streaming, and System Design.
                </p>
            </div>
        </div>
    </main>
</div>
