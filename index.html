<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Sheets - Python, Pandas, Spark</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <aside class="sidebar">
        <h1>Data Sheets</h1>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="src/python/index.html">Python</a></li>
                <li><a href="src/pandas/index.html">Pandas</a></li>
                <li><a href="src/spark/index.html">Spark</a></li>
            </ul>
        </nav>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <span>Theme</span>
            <span>
                <span class="light-icon">&#9728;</span>
                <span class="dark-icon">&#9790;</span>
            </span>
        </button>
        <footer>Simple data reference</footer>
    </aside>

    <main class="main-content">
        <div class="hero">
            <h1>Data Sheets</h1>
            <p>Simple guides for Python, Pandas, and Spark.</p>
        </div>

        <section>
            <h2>Choose a technology</h2>
            <div class="tech-grid">
                <a href="src/python/index.html" class="tech-card">
                    <div class="icon">🐍</div>
                    <h3>Python</h3>
                    <p>Basics, OOP, performance, DSA</p>
                </a>
                <a href="src/pandas/index.html" class="tech-card">
                    <div class="icon">🐼</div>
                    <h3>Pandas</h3>
                    <p>DataFrames, ETL pipelines</p>
                </a>
                <a href="src/spark/index.html" class="tech-card">
                    <div class="icon">✨</div>
                    <h3>Spark</h3>
                    <p>PySpark, streaming</p>
                </a>
            </div>
        </section>
    </main>
    <script>
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });
    </script>
</body>
</html>
